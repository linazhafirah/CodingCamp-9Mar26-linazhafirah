<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="dashboard">
        <header class="greeting-section">
            <div id="greeting" class="greeting"></div>
            <div id="time" class="time"></div>
            <div id="date" class="date"></div>
        </header>

        <section class="timer-section">
            <h2>Focus Timer</h2>
            <div id="timer-display" class="timer-display">25:00</div>
            <div class="timer-controls">
                <button id="timer-start" class="btn btn-primary">Start</button>
                <button id="timer-stop" class="btn btn-secondary">Stop</button>
                <button id="timer-reset" class="btn btn-secondary">Reset</button>
            </div>
        </section>

        <section class="tasks-section">
            <h2>To-Do List</h2>
            <form id="task-form" class="task-form">
                <input type="text" id="task-input" class="task-input" placeholder="Add a new task..." aria-label="New task">
                <button type="submit" class="btn btn-primary">Add</button>
            </form>
            <ul id="task-list" class="task-list"></ul>
        </section>

        <section class="links-section">
            <h2>Quick Links</h2>
            <form id="link-form" class="link-form">
                <input type="text" id="link-label" class="link-input" placeholder="Label" aria-label="Link label">
                <input type="text" id="link-url" class="link-input" placeholder="URL (https://...)" aria-label="Link URL">
                <button type="submit" class="btn btn-primary">Add</button>
            </form>
            <div id="link-error" class="error-message"></div>
            <div id="links-container" class="links-container"></div>
        </section>

        <div id="storage-error" class="storage-error" style="display: none;">
            Data persistence is unavailable. Your changes will not be saved.
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
